name: deploy

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install feedgen pyyaml

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        continue-on-error: true

      - name: Download fonts
        continue-on-error: true
        run: |
          mkdir -p fonts
          # Source Sans Pro (body font)
          curl -sL "https://github.com/adobe-fonts/source-sans-pro/releases/download/3.006R/source-sans-pro-3.006R.zip" -o source-sans-pro.zip
          unzip -o source-sans-pro.zip -d /tmp/ssp
          cp /tmp/ssp/source-sans-pro-3.006R/OTF/*.otf fonts/
          # Font Awesome 6 (icons) — use GitHub releases for reliability
          curl -sL "https://github.com/FortAwesome/Font-Awesome/releases/download/6.7.2/fontawesome-free-6.7.2-desktop.zip" -o fa.zip
          unzip -o fa.zip -d /tmp/fa
          cp /tmp/fa/fontawesome-free-6.7.2-desktop/otfs/*.otf fonts/

      - name: Generate CV Typst source
        continue-on-error: true
        run: python generate_cv.py

      - name: Compile CV PDF
        continue-on-error: true
        run: typst compile cv.typ cv.pdf --font-path ./fonts --ignore-system-fonts

      - name: Build HTML Assets
        # User site (kaushikreddym.github.io) is served from the root,
        # so no BASE_URL subpath is needed.
        run: myst build --html

      - name: Generate RSS and Atom feeds
        run: python generate_rss.py

      - name: Rewrite localhost URLs in sitemap
        run: |
          if [ -f ./_build/html/sitemap.xml ]; then
            sed -i 's|http://localhost:[0-9]*|https://kaushikreddym.github.io|g' ./_build/html/sitemap.xml
          fi

      - name: Inject Giscus comments into blog posts
        run: python inject_comments.py

      - name: Copy static files and rewrite CV URL to stable path
        run: |
          cp CNAME ./_build/html/ 2>/dev/null || true
          # Stable path for the cover photo used as the top-nav background in custom.css
          cp cover.png ./_build/html/cover.png 2>/dev/null || true
          # Only publish and rewrite the CV link if the PDF actually compiled,
          # otherwise we'd ship a footer link to a missing /cv.pdf.
          if [ -f cv.pdf ]; then
            cp cv.pdf ./_build/html/cv.pdf
            # Rewrite hashed CV URL to stable /cv.pdf path
            find ./_build/html -name "*.html" -exec sed -i 's|/build/cv-[a-f0-9]\{20,\}\.pdf|/cv.pdf|g' {} \;
          else
            echo "::warning::cv.pdf not found — skipping CV publish; footer CV link may be broken."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
